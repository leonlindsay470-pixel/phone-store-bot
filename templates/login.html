<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(180deg,#eff4fb 0%,#e8eef8 100%); color:#172033; }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:440px; background:#fff; border:1px solid #e4e9f2; border-radius:24px; box-shadow:0 18px 44px rgba(15,23,42,.08); padding:28px; }
    .badge { display:inline-block; margin-bottom:16px; background:#dbeafe; color:#1d4ed8; padding:8px 12px; border-radius:999px; font-size:13px; font-weight:700; }
    h1 { margin:0 0 8px; font-size:28px; }
    p.sub { margin:0 0 20px; color:#64748b; line-height:1.5; }
    label { display:block; font-weight:700; margin:14px 0 6px; }
    input { width:100%; border:1px solid #d7deea; background:#f8fafc; border-radius:14px; padding:14px 16px; font-size:15px; }
    input:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 4px rgba(37,99,235,.12); background:#fff; }
    button { width:100%; margin-top:18px; border:none; border-radius:14px; background:#0f172a; color:#fff; padding:14px 16px; font-size:15px; font-weight:700; cursor:pointer; }
    .muted { margin-top:16px; color:#64748b; font-size:14px; }
    .muted a { color:#1d4ed8; text-decoration:none; font-weight:700; }
    .flash { margin-bottom:12px; padding:12px 14px; border-radius:12px; background:#fee2e2; color:#991b1b; font-size:14px; }
    .home-link { display:inline-block; margin-top:12px; color:#475569; text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">Store Admin Access</div>
      <h1>Log in</h1>
      <p class="sub">Access your dashboard, leads, and preset settings.</p>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="flash">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
        <button type="submit">Log in</button>
      </form>
      <div class="muted">No account yet? <a href="/signup">Create one</a></div>
      <a class="home-link" href="/">← Back to website demo</a>
    </div>
  </div>
</body>
</html>
